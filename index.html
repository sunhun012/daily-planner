<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>데일리 플래너</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f0; margin: 0; display: flex; justify-content: center; padding: 20px;
        }
        .planner-card {
            background-color: #ffffff; width: 100%; max-width: 450px; border-radius: 40px;
            padding: 40px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .date-row { display: flex; justify-content: center; align-items: center; gap: 15px; }
        #datePicker {
            font-size: 24px; font-weight: bold; border: none; background: transparent;
            color: #333; cursor: pointer; text-align: center; width: 160px; outline: none;
        }
        .arrow { cursor: pointer; color: #333; user-select: none; font-size: 24px; }
        .day-text { font-size: 14px; color: #888; margin-top: 5px; text-transform: uppercase; }
        .quote-area { text-align: center; font-size: 13px; color: #aaa; margin: 10px 0 20px; min-height: 1.2em; }

        .section-title {
            font-size: 12px; font-weight: bold; color: #333; margin: 25px 0 10px 5px;
            border-bottom: 1px dashed #ddd; padding-bottom: 5px; text-transform: uppercase;
        }

        .todo-container { background-color: #f5f5f5; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .todo-input { width: 100%; border: none; background: transparent; font-size: 15px; outline: none; margin-bottom: 10px; }
        .todo-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 15px; }
        .todo-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .todo-text.completed { text-decoration: line-through; color: #aaa; }

        .input-box { background-color: #f5f5f5; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        input[type="text"], input[type="number"] { width: 100%; border: none; background: transparent; font-size: 15px; outline: none; }

        .inbody-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; background-color: #f5f5f5;
            border-radius: 20px; padding: 20px; margin-top: 30px; text-align: center;
        }
        .inbody-item { display: flex; flex-direction: column; gap: 5px; }
        .inbody-label { font-size: 11px; color: #888; }
        .inbody-input { text-align: center; font-weight: bold; font-size: 16px; width: 100%; border: none; background: transparent; outline: none; }

        .chart-box { height: 250px; margin-top: 20px; }
        .save-btn {
            width: 100%; margin-top: 20px; padding: 18px; border-radius: 15px;
            border: none; background-color: #333; color: white; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="planner-card">
    <div class="header">
        <div class="date-row">
            <span class="arrow" onclick="changeDate(-1)">❮</span>
            <input type="date" id="datePicker" onchange="jumpToDate(this.value)">
            <span class="arrow" onclick="changeDate(1)">❯</span>
        </div>
        <div id="dayDisplay" class="day-text"></div>
        <div id="quoteDisplay" class="quote-area"></div>
    </div>

    <!-- 할 일 섹션 -->
    <div class="section-title">아침</div>
    <div class="todo-container">
        <input type="text" class="todo-input" placeholder="계획 입력 후 엔터..." onkeypress="addTodo(event, 'mor')">
        <div id="list_mor"></div>
    </div>

    <div class="section-title">오후</div>
    <div class="todo-container">
        <input type="text" class="todo-input" placeholder="계획 입력 후 엔터..." onkeypress="addTodo(event, 'aft')">
        <div id="list_aft"></div>
    </div>

    <div class="section-title">저녁</div>
    <div class="todo-container">
        <input type="text" class="todo-input" placeholder="계획 입력 후 엔터..." onkeypress="addTodo(event, 'eve')">
        <div id="list_eve"></div>
    </div>

    <!-- 식단 섹션 -->
    <div class="section-title">식단</div>
    <div class="input-box"><input type="text" id="meal_brk" placeholder="아침 식사"></div>
    <div class="input-box"><input type="text" id="meal_lun" placeholder="점심 식사"></div>
    <div class="input-box"><input type="text" id="meal_din" placeholder="저녁 식사"></div>

    <!-- 인바디 섹션 -->
    <div class="inbody-grid">
        <div class="inbody-item">
            <span class="inbody-label">체중</span>
            <input type="number" id="weight" class="inbody-input" step="0.1" placeholder="0.0">
            <span class="inbody-label">kg</span>
        </div>
        <div class="inbody-item" style="border-left: 1px solid #ddd; border-right: 1px solid #ddd;">
            <span class="inbody-label">근육</span>
            <input type="number" id="muscle" class="inbody-input" step="0.1" placeholder="0.0">
            <span class="inbody-label">kg</span>
        </div>
        <div class="inbody-item">
            <span class="inbody-label">지방</span>
            <input type="number" id="fat" class="inbody-input" step="0.1" placeholder="0.0">
            <span class="inbody-label">%</span>
        </div>
    </div>

    <button class="save-btn" onclick="saveData()">오늘의 기록 저장하기</button>

    <!-- 통합 변화 그래프 -->
    <div class="section-title">최근 7일 신체 변화</div>
    <div class="chart-box">
        <canvas id="bodyChart"></canvas>
    </div>
</div>

<script>
    let currentDate = new Date();
    let todoLists = { mor: [], aft: [], eve: [] };
    const quotes = ["기록은 기억을 이긴다.", "작은 변화가 큰 차이를 만든다.", "오늘의 노력이 내일의 나를 만든다.", "생각은 머물게 하고, 기록은 나아가게 한다."];

    function updateDisplay() {
        const y = currentDate.getFullYear();
        const m = String(currentDate.getMonth() + 1).padStart(2, '0');
        const d = String(currentDate.getDate()).padStart(2, '0');
        document.getElementById('datePicker').value = `${y}-${m}-${d}`;

        const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
        document.getElementById('dayDisplay').innerText = dayNames[currentDate.getDay()];
       
        const key = `data_${y}-${parseInt(m)}-${parseInt(d)}`;
        const saved = JSON.parse(localStorage.getItem(key) || '{}');
       
        todoLists = saved.todoLists || { mor: [], aft: [], eve: [] };
        renderTodos();

        document.getElementById('meal_brk').value = saved.meal_brk || '';
        document.getElementById('meal_lun').value = saved.meal_lun || '';
        document.getElementById('meal_din').value = saved.meal_din || '';
        document.getElementById('weight').value = saved.weight || '';
        document.getElementById('muscle').value = saved.muscle || '';
        document.getElementById('fat').value = saved.fat || '';

        document.getElementById('quoteDisplay').innerText = quotes[Math.floor(Math.random() * quotes.length)];
        renderChart();
    }

    function jumpToDate(dateStr) { if(dateStr) { currentDate = new Date(dateStr); updateDisplay(); } }
    function changeDate(offset) { currentDate.setDate(currentDate.getDate() + offset); updateDisplay(); }
   
    function addTodo(e, type) {
        if (e.key === 'Enter' && e.target.value.trim() !== '') {
            todoLists[type].push({ text: e.target.value, completed: false });
            e.target.value = '';
            renderTodos();
        }
    }

    function renderTodos() {
        ['mor', 'aft', 'eve'].forEach(type => {
            const container = document.getElementById(`list_${type}`);
            container.innerHTML = todoLists[type].map((todo, idx) => `
                <div class="todo-item">
                    <input type="checkbox" ${todo.completed ? 'checked' : ''} onclick="toggleTodo('${type}', ${idx})">
                    <span class="todo-text ${todo.completed ? 'completed' : ''}">${todo.text}</span>
                </div>
            `).join('');
        });
    }

    function toggleTodo(type, index) {
        todoLists[type][index].completed = !todoLists[type][index].completed;
        renderTodos();
    }

    function saveData() {
        const y = currentDate.getFullYear();
        const m = currentDate.getMonth() + 1;
        const d = currentDate.getDate();
        const key = `data_${y}-${m}-${d}`;
        const data = {
            todoLists,
            weight: document.getElementById('weight').value,
            muscle: document.getElementById('muscle').value,
            fat: document.getElementById('fat').value,
            meal_brk: document.getElementById('meal_brk').value,
            meal_lun: document.getElementById('meal_lun').value,
            meal_din: document.getElementById('meal_din').value
        };
        localStorage.setItem(key, JSON.stringify(data));
        alert('저장되었습니다!');
        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('bodyChart').getContext('2d');
        const labels = [];
        const weightData = [];
        const muscleData = [];
        const fatData = [];

        for (let i = 6; i >= 0; i--) {
            const tempD = new Date(currentDate);
            tempD.setDate(tempD.getDate() - i);
            const k = `data_${tempD.getFullYear()}-${tempD.getMonth()+1}-${tempD.getDate()}`;
            labels.push(`${tempD.getMonth()+1}/${tempD.getDate()}`);
            const s = JSON.parse(localStorage.getItem(k) || '{}');
            weightData.push(s.weight || null);
            muscleData.push(s.muscle || null);
            fatData.push(s.fat || null);
        }

        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    { label: '체중(kg)', data: weightData, borderColor: '#333', tension: 0.3, fill: false, spanGaps: true },
                    { label: '근육(kg)', data: muscleData, borderColor: '#4A90E2', tension: 0.3, fill: false, spanGaps: true },
                    { label: '지방(%)', data: fatData, borderColor: '#E91E63', tension: 0.3, fill: false, spanGaps: true }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } },
                scales: { y: { beginAtZero: false } }
            }
        });
    }
    updateDisplay();
</script>
</body>
</html>
